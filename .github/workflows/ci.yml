name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 20 * * 0"

jobs:
  quick-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run lint
        run: ruff check .

      - name: Run quick tests
        env:
          MPLBACKEND: Agg
        run: |
          pytest \
            tests/test_encoding.py \
            tests/test_registry_integrity.py \
            tests/test_model_smoke.py \
            tests/test_documentation.py \
            tests/test_national_contest_template.py

  gate-tests:
    runs-on: ubuntu-latest
    needs: quick-tests
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run gate tests
        env:
          MPLBACKEND: Agg
        run: |
          pytest \
            tests/test_paper_quality.py \
            tests/test_task_traceability.py \
            tests/test_innovation_evidence.py \
            tests/test_gate_summary.py \
            tests/test_workbench_interaction.py \
            tests/test_workflow_smoke.py \
            tests/test_phase3_regression_and_layout.py

  security:
    runs-on: ubuntu-latest
    needs: quick-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run security checks
        run: |
          bandit -r app agents models tools workflows -q -ll
          pip-audit -r requirements.txt --progress-spinner off

  full-tests:
    runs-on: ubuntu-latest
    needs: [gate-tests, security]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run full test suite
        env:
          MPLBACKEND: Agg
        run: coverage run -m pytest

      - name: Report coverage
        run: coverage report

  real-case-slow-regression:
    runs-on: ubuntu-latest
    needs: full-tests
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run real-case slow regression
        env:
          MPLBACKEND: Agg
        run: |
          if [ -f benchmarks/real_competition_corpus.json ] && [ -f benchmarks/real_competition_gold.json ]; then
            python -m tools.real_case_regression \
              --cases benchmarks/real_competition_corpus.json \
              --gold benchmarks/real_competition_gold.json \
              --output-dir workspace/real_case_regression
          else
            echo "Skipping slow regression: real-case benchmark files are not present."
          fi
